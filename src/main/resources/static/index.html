<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Talkmate - Chat App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div id="username-page">
    <div class="username-page-container">
        <h1 class="title">👋 Welcome to Talkmate</h1>
        <form id="usernameForm">
            <input type="text" id="name" placeholder="Enter your username..." required />
            <button type="submit">Join Chat</button>
        </form>
    </div>
</div>

<div id="chat-page" class="hidden">
    <div class="chat-container">
        <header class="chat-header">
            <h2>Talkmate 💬</h2>
        </header>
        <div class="connecting">Connecting...</div>
        <ul id="messageArea" class="message-area"></ul>
        <form id="messageForm">
            <input type="text" id="message" placeholder="Type a message..." autocomplete="off" required />
            <button type="submit">Send</button>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
